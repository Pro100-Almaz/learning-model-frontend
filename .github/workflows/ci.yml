name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      # The contract lives in a sibling repo at runtime. In CI we let the
      # generator run only if the file is present; otherwise the previously
      # committed schema (none yet) is used.
      - name: Generate API types (if contract is present)
        run: |
          if [ -f ../learning-model/plan/openapi.yaml ]; then
            npm run openapi:gen
          else
            echo "openapi.yaml not present in CI workspace — skipping client gen"
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
